services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echorec
      POSTGRES_PASSWORD: echorec
      POSTGRES_DB: echorec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_create_tracks.sql:/docker-entrypoint-initdb.d/001_create_tracks.sql:ro
      - ./db/seed/tracks.sql:/docker-entrypoint-initdb.d/002_seed_tracks.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echorec -d echorec"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - --mode
      - dev-container
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      API_ADDR: ":8080"
      DATABASE_URL: postgres://echorec:echorec@postgres:5432/echorec?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    environment:
      DATABASE_URL: postgres://echorec:echorec@postgres:5432/echorec?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: listening-events
      SIMULATOR_INTERVAL: 2s
      SIMULATOR_USER_COUNT: 20
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: listening-events
      KAFKA_GROUP_ID: feature-consumer
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      args:
        API_URL: http://api:8080
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
